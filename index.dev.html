  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Sawdust &amp; Strings — acoustic and electric guitar duo with a unique blend of sound. Timeless classics and modern Americana for breweries, wineries, weddings, and live venues."
    />
    <link rel="canonical" href="https://sawdustandstrings.com/" />
    <title>Sawdust &amp; Strings | Guitar Duo</title>
    <script type="text/javascript">
      (function (l) {
        // Decode GitHub Pages SPA redirects: /?/epk → /epk
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          var path = l.pathname.replace(/\/$/, "") + decoded;
          if (!path || path.charAt(0) !== "/") path = "/" + (path || "");
          // Collapse broken loop URLs back to a clean path.
          if (path.indexOf("~and~") !== -1 || path.indexOf("/&/") !== -1) {
            path = "/";
          }
          window.history.replaceState(null, null, path + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
